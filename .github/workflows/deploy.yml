name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Rebuild ~4x/day so calendar-feed changes propagate (PLAN §2 Calendar).
    # GitHub disables schedules after 60 idle days; the keepalive step below
    # prevents that. If events ever look stale: Actions tab → Run workflow.
    - cron: '13 3,9,15,21 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Remove these two once the custom domain (mannptsa.org) is attached
          ASTRO_SITE: https://allisonwhilden.github.io
          ASTRO_BASE: /mann-ptsa-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      # Prevents GitHub from auto-disabling the scheduled rebuild after 60
      # quiet days (uses API activity, no dummy commits).
      - uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
